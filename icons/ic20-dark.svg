<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- chip body -->
  <rect x="3.5" y="3.5" width="9" height="9" rx="1" fill="none" stroke="#6FC3DF" stroke-width="1"/>
  <!-- pins left -->
  <line x1="1" y1="5.5" x2="3.5" y2="5.5" stroke="#6FC3DF" stroke-width="1"/>
  <line x1="1" y1="8"   x2="3.5" y2="8"   stroke="#6FC3DF" stroke-width="1"/>
  <line x1="1" y1="10.5" x2="3.5" y2="10.5" stroke="#6FC3DF" stroke-width="1"/>
  <!-- pins right -->
  <line x1="12.5" y1="5.5"  x2="15" y2="5.5"  stroke="#6FC3DF" stroke-width="1"/>
  <line x1="12.5" y1="8"    x2="15" y2="8"    stroke="#6FC3DF" stroke-width="1"/>
  <line x1="12.5" y1="10.5" x2="15" y2="10.5" stroke="#6FC3DF" stroke-width="1"/>
  <!-- label -->
  <text x="8" y="9.8" font-size="5.5" font-family="monospace" fill="#6FC3DF" text-anchor="middle" font-weight="bold">20</text>
